<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>导航后台登录</title>
  <!-- 图标库 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary: #409eff;
      --sidebar: #2f4050;
      --bg: #f3f3f4;
      --card: #fff;
      --text: #333;
      --border: #e6e6e6;
    }

    .dark-mode {
      --primary: #409eff;
      --bg: #1a1a1a;
      --card: #2d2d2d;
      --text: #eee;
      --border: #444;
    }

    body {
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: all 0.3s;
    }

    /* 登录卡片 */
    .login-box {
      background: var(--card);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
    }

    /* 标题 */
    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-area i {
      font-size: 40px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .logo-area h2 {
      font-size: 22px;
      color: var(--text);
      font-weight: 600;
    }

    .logo-area p {
      color: #909399;
      font-size: 13px;
      margin-top: 5px;
    }

    /* 输入框组 */
    .input-group {
      margin-bottom: 22px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .input-item {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-item i {
      position: absolute;
      left: 14px;
      color: #c0c4cc;
      font-size: 16px;
    }

    .input-item input {
      width: 100%;
      height: 44px;
      padding: 0 15px 0 42px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    .input-item input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
    }

    /* 选项栏 */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 25px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      cursor: pointer;
    }

    .forgot {
      color: var(--primary);
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    /* 登录按钮 */
    .login-btn {
      width: 100%;
      height: 46px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 15px;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    /* 底部版权 */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #909399;
      margin-top: 20px;
    }

    /* 深色模式切换 */
    .theme-switch {
      position: absolute;
      top: 25px;
      right: 25px;
      font-size: 20px;
      color: var(--text);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- 深色模式切换 -->
  <div class="theme-switch" id="theme-toggle">
    <i class="fa fa-moon-o"></i>
  </div>

  <!-- 登录卡片 -->
  <div class="login-box">
    <div class="logo-area">
      <i class="fa fa-compass"></i>
      <h2>导航网站后台</h2>
      <p>请登录管理员账号</p>
    </div>

    <div class="input-group">
      <label>管理员账号</label>
      <div class="input-item">
        <i class="fa fa-user"></i>
        <input type="text" id="username" placeholder="请输入账号">
      </div>
    </div>

    <div class="input-group">
      <label>登录密码</label>
      <div class="input-item">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" checked> 记住我
      </label>
      <a href="#" class="forgot">忘记密码？</a>
    </div>

    <button class="login-btn" id="loginBtn">
      <i class="fa fa-sign-in"></i> 立即登录
    </button>

    <div class="footer">
      © 2025 导航管理系统 版权所有
    </div>
  </div>

  <script>
    // API 配置 - 部署后修改为你的 Workers 地址
    // const API_BASE_URL = 'http://localhost:8787';  // 本地开发用
    const API_BASE_URL = 'https://navbackend.1540956703.workers.dev';  // 生产环境用

    // 深色/浅色模式
    const themeToggle = document.getElementById('theme-toggle');
    const icon = themeToggle.querySelector('i');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      icon.className = document.body.classList.contains('dark-mode')
        ? 'fa fa-sun-o'
        : 'fa fa-moon-o';
    });

    // 登录按钮点击
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('请输入用户名和密码');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      try {
        const response = await fetch(`${API_BASE_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.token) {
          // 保存 token 到 localStorage
          localStorage.setItem('admin_token', data.token);
          alert('登录成功！');
          window.location.href = 'index.html';
        } else {
          alert(data.error || '登录失败');
        }
      } catch (error) {
        alert('网络错误，请检查后端服务是否正常运行');
        console.error('Login error:', error);
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fa fa-sign-in"></i> 立即登录';
      }
    });

    // 支持回车登录
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
