  <!-- 搜索引擎编辑弹窗 -->
  <div class="modal" id="searchEngineModal">
    <div class="modal-content">
      <div class="modal-header"><h3 id="searchEngineModalTitle">添加搜索引擎</h3><span class="modal-close" onclick="closeModal('searchEngineModal')">&times;</span></div>
      <input type="hidden" id="search-engine-id">
      <input type="hidden" id="search-engine-config-id">
      <div class="form-group"><label>引擎 ID</label><input type="text" id="search-engine-engine-id" placeholder="如：type-bing"></div>
      <div class="form-group"><label>引擎名称</label><input type="text" id="search-engine-name" placeholder="如：Bing"></div>
      <div class="form-group"><label>搜索 URL</label><input type="text" id="search-engine-url" placeholder="https://cn.bing.com/search?q="></div>
      <div class="form-group"><label>占位符</label><input type="text" id="search-engine-placeholder" placeholder="微软 Bing 搜索"></div>
      <div class="form-group"><label>排序</label><input type="number" id="search-engine-sort" value="0"></div>
      <button class="btn btn-primary" onclick="saveSearchEngine()">保存</button>
    </div>
  </div>
